apiVersion: batch/v1
kind: Job
metadata:
  name: warden-schema-migrate
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: warden-control-plane
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: migrate
          image: ghcr.io/ishaiktaher/warden@sha256:replace-with-reviewed-digest
          command: ["python", "-m", "scripts.migrate"]
          envFrom:
            # Use a short-lived migration secret whose DATABASE_URL role has
            # DDL authority. Application pods should use a non-DDL role.
            - secretRef: {name: warden-migration-runtime}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: {drop: ["ALL"]}
          resources:
            requests: {cpu: 50m, memory: 128Mi}
            limits: {cpu: 500m, memory: 512Mi}
