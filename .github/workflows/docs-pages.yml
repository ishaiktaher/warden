name: publish-documentation

on:
  push:
    branches: [main]
    paths:
      - "ui/docs.html"
      - "ui/openapi.html"
      - "docs/**"
      - "sdk-js/README.md"
      - "sdk-python/README.md"
      - ".github/workflows/docs-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Prepare static documentation
        run: |
          mkdir -p _site
          sed -e 's|href="/"|href="https://warden-tau.vercel.app/"|g' \
              -e 's|href="/console"|href="https://warden-tau.vercel.app/console"|g' \
              -e 's|href="/openapi.html"|href="./openapi.html"|g' \
              ui/docs.html > _site/index.html
          sed -e 's|href="/documentation"|href="./"|g' \
              ui/openapi.html > _site/openapi.html
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
