name: control-plane-ci
on: [push, pull_request]

permissions:
  contents: read
  pull-requests: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: false
          tags: warden-control-plane:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
  sdk:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]
    defaults:
      run:
        working-directory: sdk-js
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: sdk-js/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm pack --dry-run
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with: {python-version: "${{ matrix.python-version }}"}
      - run: pip install -r requirements-dev.txt
      - run: ruff check control_plane tests
      - run: mypy --ignore-missing-imports control_plane
      - run: python -m unittest discover -s tests -v
      - run: bandit -q -r control_plane
      - run: pip-audit -r requirements.txt
  provider-packs:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pack: [aws, azure, gcp, vault, pkcs11]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with: {python-version: "3.11"}
      - run: pip install -r requirements-${{ matrix.pack }}.txt
      - run: pip install pip-audit==2.10.1
      - run: python -m unittest tests.test_native_providers -v
      - run: pip-audit -r requirements-${{ matrix.pack }}.txt
