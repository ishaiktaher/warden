name: control-plane-ci
on: [push, pull_request]

permissions:
  contents: read
  pull-requests: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: false
          tags: warden-control-plane:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
  sdk:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]
    defaults:
      run:
        working-directory: sdk-js
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: sdk-js/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm pack --dry-run
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with: {python-version: "${{ matrix.python-version }}"}
      - run: pip install -r requirements-dev.txt
      - run: ruff check control_plane tests
      - run: mypy --ignore-missing-imports control_plane
      - run: python -m unittest discover -s tests -v
      - run: bandit -q -r control_plane
      - run: pip-audit -r requirements.txt
  provider-packs:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pack: [aws, azure, gcp, vault, pkcs11]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with: {python-version: "3.11"}
      - run: pip install -r requirements-${{ matrix.pack }}.txt
      - run: pip install pip-audit==2.10.1
      - run: python -m unittest tests.test_native_providers -v
      - run: pip-audit -r requirements-${{ matrix.pack }}.txt
