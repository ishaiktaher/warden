name: control-plane-ci
on: [push, pull_request]

permissions:
  contents: read
  pull-requests: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deploy/terraform
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.15.8
      - run: terraform fmt -check -diff
      - run: terraform init -backend=false -input=false
      - run: terraform validate
  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: false
          tags: warden-control-plane:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
  sdk:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]
    defaults:
      run:
        working-directory: sdk-js
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: sdk-js/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm audit --audit-level=high
      - run: npm pack --dry-run
  python-sdk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk-python
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with: {python-version: "3.11"}
      - run: python -m pip install build==1.3.0 twine==6.2.0
      - run: PYTHONPATH=src python -m unittest discover -s tests -v
      - run: python -m build
      - run: python -m twine check dist/*
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with: {python-version: "${{ matrix.python-version }}"}
      - run: pip install -r requirements/dev.txt
      - run: ruff check api control_plane examples scripts tests sdk-python/src sdk-python/tests
      - run: mypy --ignore-missing-imports api control_plane examples scripts sdk-python/src
      - run: python -m unittest discover -s tests -v
      - name: Regenerate and verify public proof metadata
        run: |
          python -m scripts.generate_proof
          git diff --exit-code -- ui/proof.json
      - run: python -m scripts.production_preflight
        env:
          CONTROL_PLANE_ENV: prod
          CONTROL_PLANE_ADMIN_KEY: ci-only-admin-key-that-is-longer-than-thirty-two-characters
          DATABASE_URL: postgresql://warden@db.internal/warden?sslmode=require
          REDIS_URL: rediss://cache.internal/0
          WARDEN_PUBLIC_URL: https://warden.example.com
          WARDEN_OIDC_ISSUER: https://identity.example.com
          WARDEN_OIDC_AUDIENCE: https://warden.example.com
          WARDEN_SIGNING_PROVIDER: http
          WARDEN_SECRETS_PROVIDER: http
          WARDEN_AUDIT_PROVIDER: http
          WARDEN_SIGNING_PROVIDER_URL: https://security.example.com
          WARDEN_SECRETS_PROVIDER_URL: https://security.example.com
          WARDEN_AUDIT_PROVIDER_URL: https://security.example.com
          WARDEN_PROVIDER_AUTH_TOKEN: ci-only-placeholder
          CONTROL_PLANE_ALLOWED_EGRESS_HOSTS: api.example.com
          OTEL_EXPORTER_OTLP_ENDPOINT: https://telemetry.example.com
      - run: bandit -q -r api control_plane examples scripts sdk-python/src
      - run: pip-audit -r requirements.txt
  provider-packs:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pack: [aws, azure, gcp, pkcs11]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with: {python-version: "3.11"}
      - run: pip install -r requirements/providers/${{ matrix.pack }}.txt
      - run: pip install pip-audit==2.10.1
      - run: python -m unittest tests.test_native_providers -v
      - run: pip-audit -r requirements/providers/${{ matrix.pack }}.txt
