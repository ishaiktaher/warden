version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule: {interval: weekly}
    groups:
      python-runtime:
        patterns: ["*"]
  - package-ecosystem: pip
    directory: /requirements
    schedule: {interval: weekly}
    groups:
      python-development:
        patterns: ["*"]
  - package-ecosystem: pip
    directory: /requirements/providers
    schedule: {interval: weekly}
    groups:
      python-provider-packs:
        patterns: ["*"]
  - package-ecosystem: npm
    directory: /sdk-js
    schedule: {interval: weekly}
    groups:
      sdk-tooling:
        patterns: ["*"]
  - package-ecosystem: github-actions
    directory: /
    schedule: {interval: weekly}
    groups:
      actions:
        patterns: ["*"]
